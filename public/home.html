<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>Pencari Rak Instant — MGNDEV</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand"></div>
    <div class="navbar-links">
      <a href="/home.html" class="active">Home</a>
      <a href="/nota.html">Scan Nota</a>
      <a href="/admin.html" id="nav-admin" style="display:none">Admin</a>
      <button id="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="main">
    <div class="home-wrap">

      <h2>PENCARI RAK INSTANT</h2>
      <p class="welcome-sub" id="welcome-sub">-MGNDEV-</p>

      <p class="home-desc">
        Upload screenshot nota untuk menemukan lokasi rak barang secara otomatis.
      </p>

      <a href="/nota.html" class="btn-login" style="display:block;text-align:center;text-decoration:none;width:100%;">
        Mulai Scan Nota
      </a>

    </div>
  </div>

  <script type="module">
    async function checkAuth() {
      try {
        const r = await fetch('/api/me');
        if (r.status === 401) window.location.href = '/';
        else {
          const data = await r.json();
          document.getElementById('welcome-sub').textContent = `Hai, ${data.user} — -MGNDEV-`;
          if (data.user === 'admin') {
            document.getElementById('nav-admin').style.display = '';
          }
        }
      } catch { window.location.href = '/'; }
    }
    checkAuth();

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    });
  </script>
</body>
</html>
